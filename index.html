<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPACE CAR SNIPER</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
  body { overflow: hidden; }
  .game {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: linear-gradient(#020617, #000);
  }
  .entity {
    position: absolute;
    will-change: transform;
  }
  .bullet {
    transition: transform 0.05s linear;
  }
</style>
</head>

<body class="bg-black text-white">

<div id="game" class="game"></div>

<script>
const game = document.getElementById("game");
const W = window.innerWidth;
const H = window.innerHeight;

/* =======================
   PLAYER (CAR)
======================= */
const player = {
  x: W / 2,
  y: H - 120,
  speed: 8,
  el: createCar(),
};

game.appendChild(player.el);

function createCar() {
  const car = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  car.setAttribute("width", 80);
  car.setAttribute("height", 40);
  car.classList.add("entity");

  car.innerHTML = `
    <rect x="10" y="10" width="60" height="20" rx="6" fill="#22d3ee"/>
    <circle cx="20" cy="35" r="5" fill="#0f172a"/>
    <circle cx="60" cy="35" r="5" fill="#0f172a"/>
  `;
  return car;
}

/* =======================
   INPUT
======================= */
const keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);
window.addEventListener("click", shoot);

/* =======================
   BULLETS
======================= */
const bullets = [];

function shoot(e) {
  const b = document.createElement("div");
  b.className = "entity bullet";
  b.style.width = "6px";
  b.style.height = "20px";
  b.style.background = "#f87171";
  b.x = player.x + 37;
  b.y = player.y;
  bullets.push(b);
  game.appendChild(b);
}

/* =======================
   ENEMIES
======================= */
const enemies = [];

function spawnEnemy(type = 1) {
  const e = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  e.setAttribute("width", 60);
  e.setAttribute("height", 60);
  e.classList.add("entity");

  e.type = type;
  e.hp = type === 3 ? 5 : 1;
  e.x = Math.random() * (W - 60);
  e.y = -60;

  e.innerHTML = type === 1 ? `
    <circle cx="30" cy="30" r="20" fill="#a855f7"/>
  ` : type === 2 ? `
    <polygon points="30,5 55,55 5,55" fill="#facc15"/>
  ` : `
    <rect x="5" y="5" width="50" height="50" rx="10" fill="#ef4444"/>
  `;

  enemies.push(e);
  game.appendChild(e);
}

/* =======================
   BOSS
======================= */
let boss = null;
function spawnBoss() {
  boss = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  boss.setAttribute("width", 200);
  boss.setAttribute("height", 120);
  boss.classList.add("entity");

  boss.x = W / 2 - 100;
  boss.y = 50;
  boss.hp = 50;

  boss.innerHTML = `
    <rect x="0" y="0" width="200" height="120" rx="20" fill="#7c2d12"/>
    <circle cx="100" cy="60" r="30" fill="#fde047"/>
  `;

  game.appendChild(boss);
}

/* =======================
   GAME LOOP
======================= */
let kills = 0;
let frame = 0;

function update() {
  frame++;

  // Player movement
  if (keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["ArrowRight"]) player.x += player.speed;
  player.x = Math.max(0, Math.min(W - 80, player.x));
  player.el.style.transform = `translate(${player.x}px, ${player.y}px)`;

  // Bullets
  bullets.forEach((b, i) => {
    b.y -= 15;
    b.style.transform = `translate(${b.x}px, ${b.y}px)`;
    if (b.y < 0) b.remove();
  });

  // Enemies
  enemies.forEach((e, i) => {
    e.y += e.type + 1;
    e.style.transform = `translate(${e.x}px, ${e.y}px)`;

    bullets.forEach((b, bi) => {
      if (
        b.x > e.x &&
        b.x < e.x + 60 &&
        b.y > e.y &&
        b.y < e.y + 60
      ) {
        e.hp--;
        b.remove();
        bullets.splice(bi, 1);
        if (e.hp <= 0) {
          e.remove();
          enemies.splice(i, 1);
          kills++;
        }
      }
    });
  });

  // Boss
  if (kills > 15 && !boss) spawnBoss();
  if (boss) {
    boss.x += Math.sin(frame / 60) * 2;
    boss.style.transform = `translate(${boss.x}px, ${boss.y}px)`;
  }

  // Spawning
  if (frame % 60 === 0 && kills < 15) {
    spawnEnemy(1 + Math.floor(Math.random() * 3));
  }

  requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
