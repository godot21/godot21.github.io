<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Space Car Sniper</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
  body { margin: 0; overflow: hidden; background: black; }
  .game {
    position: relative;
    width: 100vw;
    height: 100vh;
    background:
      radial-gradient(circle at 50% 120%, #020617, #000),
      repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.04) 0 2px,
        transparent 2px 80px
      );
  }
  .entity {
    position: absolute;
    will-change: transform;
  }
  .glow {
    filter: drop-shadow(0 0 12px currentColor);
  }
  .laser {
    background: linear-gradient(#fecaca, #ef4444);
    box-shadow: 0 0 12px #f87171;
  }
</style>
</head>

<body>
<div id="game" class="game"></div>

<script>
const game = document.getElementById("game");
const W = innerWidth, H = innerHeight;
const keys = {};
let frame = 0, kills = 0;

/* ================= PLAYER ================= */
const player = {
  x: W / 2,
  y: H - 140,
  speed: 9,
  el: createCar()
};
game.appendChild(player.el);

function createCar() {
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("width", 120);
  svg.setAttribute("height", 60);
  svg.classList.add("entity");

  svg.innerHTML = `
    <defs>
      <linearGradient id="carBody" x1="0" x2="1">
        <stop offset="0%" stop-color="#22d3ee"/>
        <stop offset="100%" stop-color="#0ea5e9"/>
      </linearGradient>
    </defs>
    <rect x="20" y="18" width="80" height="22" rx="10" fill="url(#carBody)"/>
    <rect x="45" y="10" width="30" height="12" rx="6" fill="#67e8f9"/>
    <circle cx="35" cy="45" r="6" fill="#020617"/>
    <circle cx="85" cy="45" r="6" fill="#020617"/>
    <rect x="0" y="26" width="14" height="8" rx="4" fill="#38bdf8"/>
    <rect x="106" y="26" width="14" height="8" rx="4" fill="#38bdf8"/>
  `;
  return svg;
}

/* ================= INPUT ================= */
addEventListener("keydown", e => keys[e.key] = true);
addEventListener("keyup", e => keys[e.key] = false);
addEventListener("click", shoot);

/* ================= BULLETS ================= */
const bullets = [];
function shoot() {
  const b = document.createElement("div");
  b.className = "entity laser";
  b.style.width = "4px";
  b.style.height = "30px";
  b.x = player.x + 58;
  b.y = player.y - 20;
  bullets.push(b);
  game.appendChild(b);
}

/* ================= ENEMIES ================= */
const enemies = [];

function spawnEnemy(type) {
  const e = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  e.setAttribute("width", 70);
  e.setAttribute("height", 70);
  e.classList.add("entity", "glow");
  e.type = type;
  e.hp = type === 3 ? 6 : type === 2 ? 3 : 1;
  e.x = Math.random() * (W - 70);
  e.y = -80;

  e.innerHTML =
    type === 1 ? `
      <circle cx="35" cy="35" r="22" fill="#a855f7"/>
      <circle cx="35" cy="35" r="10" fill="#e9d5ff"/>
    ` :
    type === 2 ? `
      <polygon points="35,5 65,60 5,60" fill="#facc15"/>
      <circle cx="35" cy="35" r="6" fill="#854d0e"/>
    ` :
    `
      <rect x="10" y="10" width="50" height="50" rx="14" fill="#ef4444"/>
      <circle cx="35" cy="35" r="12" fill="#fecaca"/>
    `;

  enemies.push(e);
  game.appendChild(e);
}

/* ================= BOSS ================= */
let boss = null;
function spawnBoss() {
  boss = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  boss.setAttribute("width", 260);
  boss.setAttribute("height", 140);
  boss.classList.add("entity", "glow");
  boss.x = W / 2 - 130;
  boss.y = 40;
  boss.hp = 60;

  boss.innerHTML = `
    <rect x="0" y="20" width="260" height="80" rx="30" fill="#7c2d12"/>
    <circle cx="130" cy="60" r="34" fill="#fde047"/>
    <circle cx="130" cy="60" r="16" fill="#92400e"/>
  `;

  game.appendChild(boss);
}

/* ================= GAME LOOP ================= */
function update() {
  frame++;

  if (keys.ArrowLeft) player.x -= player.speed;
  if (keys.ArrowRight) player.x += player.speed;
  player.x = Math.max(0, Math.min(W - 120, player.x));
  player.el.style.transform =
    `translate(${player.x}px, ${player.y + Math.sin(frame/10)*2}px)`;

  bullets.forEach((b, i) => {
    b.y -= 18;
    b.style.transform = `translate(${b.x}px, ${b.y}px)`;
    if (b.y < 0) { b.remove(); bullets.splice(i,1); }
  });

  enemies.forEach((e, i) => {
    e.y += 2 + e.type;
    e.x += Math.sin(frame/20 + i) * e.type;
    e.style.transform = `translate(${e.x}px, ${e.y}px)`;

    bullets.forEach((b, bi) => {
      if (
        b.x > e.x && b.x < e.x+70 &&
        b.y > e.y && b.y < e.y+70
      ) {
        e.hp--;
        b.remove();
        bullets.splice(bi,1);
        if (e.hp <= 0) {
          e.remove();
          enemies.splice(i,1);
          kills++;
        }
      }
    });
  });

  if (kills > 15 && !boss) spawnBoss();
  if (boss) {
    boss.x += Math.sin(frame/40) * 2;
    boss.style.transform = `translate(${boss.x}px, ${boss.y}px)`;
  }

  if (frame % 50 === 0 && kills < 15)
    spawnEnemy(1 + Math.floor(Math.random()*3));

  requestAnimationFrame(update);
}
update();
</script>
</body>
</html>
