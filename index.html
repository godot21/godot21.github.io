<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>2048 – Tailwind Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .tile {
      transition: all 0.2s ease-in-out;
    }
    .pop {
      animation: pop 0.2s ease;
    }
    @keyframes pop {
      0% { transform: scale(0.9); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen text-white">

  <div>
    <h1 class="text-4xl font-bold text-center mb-4">2048</h1>

    <div id="board"
      class="grid grid-cols-4 gap-3 bg-slate-700 p-3 rounded-xl w-80 h-80">
    </div>

    <p class="text-center mt-4 text-slate-300">
      Use arrow keys
    </p>
  </div>

<script>
const boardEl = document.getElementById("board");
const size = 4;
let board = [];

const colors = {
  2: "bg-slate-200 text-slate-800",
  4: "bg-slate-300 text-slate-800",
  8: "bg-orange-400",
  16: "bg-orange-500",
  32: "bg-orange-600",
  64: "bg-orange-700",
  128: "bg-yellow-400 text-slate-800",
  256: "bg-yellow-500 text-slate-800",
  512: "bg-yellow-600",
  1024: "bg-green-500",
  2048: "bg-green-600",
};

function init() {
  board = Array(size * size).fill(0);
  addTile();
  addTile();
  render();
}

function addTile() {
  const empty = board
    .map((v, i) => v === 0 ? i : null)
    .filter(v => v !== null);

  if (!empty.length) return;
  const i = empty[Math.floor(Math.random() * empty.length)];
  board[i] = Math.random() < 0.9 ? 2 : 4;
}

function render() {
  boardEl.innerHTML = "";
  board.forEach(value => {
    const tile = document.createElement("div");
    tile.className = `
      tile flex items-center justify-center rounded-lg font-bold text-2xl
      ${value ? colors[value] || "bg-purple-500" : "bg-slate-600"}
    `;
    tile.textContent = value || "";
    if (value) tile.classList.add("pop");
    boardEl.appendChild(tile);
  });
}

function slide(row) {
  row = row.filter(v => v);
  for (let i = 0; i < row.length - 1; i++) {
    if (row[i] === row[i + 1]) {
      row[i] *= 2;
      row[i + 1] = 0;
    }
  }
  return row.filter(v => v);
}

function move(direction) {
  let moved = false;

  for (let i = 0; i < size; i++) {
    let row = [];

    for (let j = 0; j < size; j++) {
      const index =
        direction === "left" ? i * size + j :
        direction === "right" ? i * size + (size - 1 - j) :
        direction === "up" ? j * size + i :
        (size - 1 - j) * size + i;

      row.push(board[index]);
    }

    const newRow = slide(row);
    while (newRow.length < size) newRow.push(0);

    for (let j = 0; j < size; j++) {
      const index =
        direction === "left" ? i * size + j :
        direction === "right" ? i * size + (size - 1 - j) :
        direction === "up" ? j * size + i :
        (size - 1 - j) * size + i;

      if (board[index] !== newRow[j]) {
        board[index] = newRow[j];
        moved = true;
      }
    }
  }

  if (moved) {
    addTile();
    render();
  }
}

window.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") move("left");
  if (e.key === "ArrowRight") move("right");
  if (e.key === "ArrowUp") move("up");
  if (e.key === "ArrowDown") move("down");
});

init();
</script>

</body>
</html>
